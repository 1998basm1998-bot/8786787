<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولدة الجمعيات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h2>تسجيل الدخول</h2>
            <input type="password" id="passwordInput" placeholder="أدخل كلمة المرور">
            <button onclick="checkPassword()">دخول</button>
            <p id="loginError" class="error-msg"></p>
        </div>
    </div>

    <header>
        <h1>مولدة الجمعيات</h1>
        <button id="themeToggle" onclick="toggleTheme()">تغيير المظهر</button>
    </header>

    <main id="mainInterface" class="container">
        <h2 class="section-title">اختر الفيز</h2>
        <div class="phases-grid">
            <button class="phase-btn" onclick="openPhase(1)">الفيز الأول</button>
            <button class="phase-btn" onclick="openPhase(2)">الفيز الثاني</button>
            <button class="phase-btn" onclick="openPhase(3)">الفيز الثالث</button>
        </div>
    </main>

    <div id="phaseInterface" class="container hidden">
        <div class="phase-header">
            <button class="back-btn" onclick="backToMain()">رجوع</button>
            <h2 id="currentPhaseTitle">الفيز</h2>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('pricing')">تسعير الامبير</button>
            <button class="tab-btn" onclick="switchTab('subscribers')">المشتركين</button>
            <button class="tab-btn" onclick="switchTab('defaulters')">المتأخرين</button>
            <button class="tab-btn" onclick="switchTab('expenses')">المصروفات</button>
        </div>

        <div class="tab-content">
            
            <div id="pricing" class="tab-pane active">
                <div class="card form-group">
                    <label>سعر الامبير بدينار العراقي:</label>
                    <input type="number" id="amperePrice">
                    <label>التاريخ:</label>
                    <input type="date" id="pricingDate">
                    <button class="btn-primary" onclick="savePricing()">حفظ</button>
                </div>
            </div>

            <div id="subscribers" class="tab-pane hidden">
                <div class="action-bar">
                    <button class="btn-success" onclick="openModal('addSubscriberModal')">اضافت مشترك جديد</button>
                </div>
                <div id="subscribersList" class="list-container mt-2"></div>
            </div>

            <div id="defaulters" class="tab-pane hidden">
                <div id="defaultersList" class="list-container"></div>
            </div>

            <div id="expenses" class="tab-pane hidden">
                <div class="card">
                    <h3>المجموع المصروفات: <span id="totalExpensesDisplay" class="danger-text">0</span></h3>
                </div>
                <div class="card form-group mt-2">
                    <button class="btn-primary" onclick="toggleExpenseForm()">اضافه صرف</button>
                    <div id="expenseFormContainer" class="hidden mt-2">
                        <input type="number" id="expenseAmount" placeholder="المبلغ">
                        <input type="text" id="expenseNote" placeholder="ملاحضه">
                        <button class="btn-success" onclick="addExpense()">حفض</button>
                    </div>
                </div>
                <div id="expensesList" class="list-container mt-2"></div>
            </div>

        </div>
    </div>

    <div id="addSubscriberModal" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="closeModal('addSubscriberModal')">&times;</span>
            <h3>اضافت مشترك</h3>
            <input type="text" id="subName" placeholder="اسم المشترك">
            <input type="number" id="subAmperes" placeholder="عدد الامبيرات">
            <input type="date" id="subDate" placeholder="تاريخ">
            <input type="text" id="subPhone" placeholder="الرقم">
            <button class="btn-success mt-2" onclick="saveSubscriber()">حفظ</button>
        </div>
    </div>

    <div id="subscriberDetailsModal" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="closeModal('subscriberDetailsModal')">&times;</span>
            <h3 id="detName"></h3>
            <div class="details-grid">
                <h2>المبلغ الكلي: <span id="detTotalRemaining" class="danger-text"></span></h2>
                <hr>
                <p>المستحق على عدد الامبيرات: <span id="detAmperes"></span></p>
                <p>كم سعر يجب ان يدفع هاذ الشهر: <span id="detMonthPrice"></span></p>
            </div>
            <button class="btn-primary mt-2" onclick="togglePaymentForm()">تسديد</button>
            <div id="paymentFormContainer" class="hidden mt-2">
                <input type="number" id="payAmount" placeholder="المبلغ للتسديد">
                <button class="btn-success mt-2" onclick="makePayment()">حفظ</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
